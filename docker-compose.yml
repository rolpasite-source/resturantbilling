version: '3.8'

services:
  # Flask Web Application
  web:
    build:
      context: .
      dockerfile: ./Docker/Dockerfile
    container_name: restaurant_billing_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://billing_user:billing_password@db:5432/restaurant_billing_web
      - LICENSE_SERVER_API=${LICENSE_SERVER_API}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billing_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: restaurant_billing_db
    environment:
      - POSTGRES_USER=billing_user
      - POSTGRES_PASSWORD=billing_password
      - POSTGRES_DB=restaurant_billing_web
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - billing_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: restaurant_billing_redis
    networks:
      - billing_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  billing_network:
    driver: bridge
