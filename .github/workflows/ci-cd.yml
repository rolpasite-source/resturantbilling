name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLASK_ENV: testing
  DATABASE_URL: sqlite:///:memory:
  SECRET_KEY: test-secret-key-change-in-production

jobs:
  # Code Quality & Linting
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pylint isort mypy
      
      - name: Check code formatting (black)
        run: black --check .
      
      - name: Check import ordering (isort)
        run: isort --check-only .
      
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Type check with mypy
        run: mypy . --ignore-missing-imports

  # Unit Tests
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run tests with pytest
        run: pytest tests/ -v --cov=. --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Security Scanning
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Check for security issues (bandit)
        run: bandit -r . -ll
        continue-on-error: true
      
      - name: Check dependencies for known vulnerabilities
        run: pip install safety && safety check
        continue-on-error: true

  # Build Docker Image
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [test, security]
    
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Docker/Dockerfile
          push: false
          tags: restaurant-billing:${{ github.sha }}

  # Deploy to Railway (only on main branch)
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Railway
    needs: build
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up
        continue-on-error: true
      
      - name: Notify deployment
        if: success()
        run: echo "✅ Deployment to Railway successful!"
      
      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment to Railway failed - check logs"

  # Integration Tests (after deployment)
  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: deploy
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest
      
      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            if curl -f https://restaurant-billing-web.railway.app/ 2>/dev/null; then
              echo "✅ Deployment is live"
              exit 0
            fi
            echo "⏳ Waiting for deployment... ($i/30)"
            sleep 10
          done
          exit 1
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v
        continue-on-error: true
